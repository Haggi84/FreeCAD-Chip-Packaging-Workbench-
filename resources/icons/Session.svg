<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Floppy disk body (save) -->
  <rect x="6" y="6" width="34" height="34" rx="3" fill="#3d8eb9" stroke="#1a5a8a" stroke-width="1.5"/>
  <!-- Floppy shutter -->
  <rect x="12" y="6" width="20" height="14" rx="1" fill="#a0c8e8" stroke="#1a5a8a" stroke-width="1"/>
  <!-- Floppy label area -->
  <rect x="10" y="24" width="24" height="12" rx="1" fill="#cce4f5" stroke="#1a5a8a" stroke-width="0.8"/>
  <!-- Label lines -->
  <line x1="13" y1="28" x2="31" y2="28" stroke="#1a5a8a" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="32" x2="26" y2="32" stroke="#1a5a8a" stroke-width="1" opacity="0.5"/>
  <!-- Load arrow (folder / up-arrow) -->
  <rect x="34" y="32" width="24" height="18" rx="3" fill="#e8a020" stroke="#a06000" stroke-width="1.5"/>
  <rect x="34" y="28" width="12" height="6" rx="2" fill="#e8a020" stroke="#a06000" stroke-width="1.5"/>
  <!-- Arrow up inside folder (load = import) -->
  <polygon points="46,37 42,43 44,43 44,47 48,47 48,43 50,43" fill="white" opacity="0.9"/>
  <!-- Dropdown chevron -->
  <polygon points="52,52 58,52 55,58" fill="#555" stroke="#333" stroke-width="0.5"/>
</svg>
