<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Chip outline -->
  <rect x="10" y="10" width="44" height="44" rx="4" fill="none" stroke="#37474f" stroke-width="2.5"/>
  <!-- Detail side: fine grid lines (left half) -->
  <line x1="10" y1="21" x2="32" y2="21" stroke="#607d8b" stroke-width="1"/>
  <line x1="10" y1="32" x2="32" y2="32" stroke="#607d8b" stroke-width="1"/>
  <line x1="10" y1="43" x2="32" y2="43" stroke="#607d8b" stroke-width="1"/>
  <line x1="21" y1="10" x2="21" y2="54" stroke="#607d8b" stroke-width="1"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#607d8b" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Performance side: coarse blocks (right half) -->
  <rect x="33" y="11" width="20" height="20" rx="1" fill="#4caf50" fill-opacity="0.25" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="33" y="33" width="20" height="20" rx="1" fill="#4caf50" fill-opacity="0.25" stroke="#4caf50" stroke-width="1.5"/>
  <!-- Toggle arrow in center -->
  <polygon points="29,28 35,32 29,36" fill="#ff9800" stroke="#e65100" stroke-width="0.5"/>
  <!-- Speed indicator dot -->
  <circle cx="50" cy="14" r="5" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
  <text x="50" y="18" font-size="7" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">P</text>
</svg>
