<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- GDS chip outline (grey square) -->
  <rect x="8" y="8" width="48" height="48" rx="3" ry="3"
        fill="none" stroke="#555555" stroke-width="3" stroke-dasharray="5,3"/>
  <!-- Leadframe body (blue square, centered) -->
  <rect x="18" y="18" width="28" height="28" rx="2" ry="2"
        fill="#3a7abf" fill-opacity="0.55" stroke="#1a4a8f" stroke-width="2"/>
  <!-- Center crosshair -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#cc4400" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="#cc4400" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#cc4400"/>
</svg>
