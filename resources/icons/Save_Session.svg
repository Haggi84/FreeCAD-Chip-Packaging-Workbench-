<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Floppy disk body -->
  <rect x="8" y="8" width="48" height="48" rx="4" ry="4" fill="#4a90d9" stroke="#2c5f8a" stroke-width="2"/>
  <!-- Floppy label area -->
  <rect x="16" y="8" width="24" height="20" rx="2" ry="2" fill="#ffffff" opacity="0.9"/>
  <!-- Save slot -->
  <rect x="36" y="10" width="12" height="14" rx="1" ry="1" fill="#2c5f8a"/>
  <!-- Storage area -->
  <rect x="12" y="34" width="40" height="18" rx="2" ry="2" fill="#ffffff" opacity="0.3"/>
  <!-- Clock overlay — circle -->
  <circle cx="46" cy="46" r="14" fill="#27ae60" stroke="#1a7a42" stroke-width="1.5"/>
  <!-- Clock face -->
  <circle cx="46" cy="46" r="11" fill="white"/>
  <!-- Clock hands -->
  <line x1="46" y1="46" x2="46" y2="38" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="46" x2="52" y2="49" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
</svg>
