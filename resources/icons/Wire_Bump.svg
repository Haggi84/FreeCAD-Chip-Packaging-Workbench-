<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Substrate / pad base -->
  <rect x="10" y="50" width="44" height="7" rx="1" fill="#888" stroke="#555" stroke-width="1"/>
  <!-- Pad metal (gold) -->
  <rect x="16" y="44" width="32" height="7" rx="1" fill="#c8960c" stroke="#8a6400" stroke-width="1"/>
  <!-- Ball bond body -->
  <ellipse cx="32" cy="36" rx="14" ry="10" fill="#f0c020" stroke="#a07000" stroke-width="1.5"/>
  <!-- Ball bond highlight -->
  <ellipse cx="27" cy="32" rx="5" ry="3.5" fill="white" opacity="0.35"/>
  <!-- Wire neck -->
  <path d="M 32,26 C 32,18 34,12 36,6" fill="none" stroke="#d4a000" stroke-width="3.5"
        stroke-linecap="round"/>
  <!-- Wire highlight -->
  <path d="M 32,26 C 32,18 33.2,12 35,6" fill="none" stroke="#ffe060" stroke-width="1.2"
        stroke-linecap="round" opacity="0.7"/>
  <!-- Dimension tick left -->
  <line x1="4" y1="44" x2="4" y2="57" stroke="#666" stroke-width="0.8"/>
  <line x1="4" y1="50.5" x2="10" y2="50.5" stroke="#666" stroke-width="0.8"/>
  <!-- Label -->
  <text x="32" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="5.5" fill="#444">Ball Bond</text>
</svg>
