<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background layers stack -->
  <rect x="6"  y="46" width="38" height="7" rx="2" fill="#555" opacity="0.6"/>
  <rect x="6"  y="36" width="38" height="7" rx="2" fill="#777" opacity="0.7"/>
  <rect x="6"  y="26" width="38" height="7" rx="2" fill="#1A99E6" opacity="0.85"/>
  <!-- Upper layers (hidden / faded) -->
  <rect x="6"  y="16" width="38" height="7" rx="2" fill="#333" opacity="0.35"/>
  <rect x="6"  y="6"  width="38" height="7" rx="2" fill="#333" opacity="0.2"/>
  <!-- Slider track -->
