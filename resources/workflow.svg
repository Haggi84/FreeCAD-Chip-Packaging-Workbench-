<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1075" font-family="'Segoe UI',Helvetica,Arial,sans-serif">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-o" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#f39c12"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════
       BACKGROUND
  ══════════════════════════════════════════════ -->
  <rect width="900" height="1075" fill="#f0f4f8"/>

  <!-- ══════════════════════════════════════════════
       TITLE BAR
  ══════════════════════════════════════════════ -->
  <rect x="15" y="12" width="870" height="46" rx="8" fill="#1a2332"/>
  <text x="450" y="41" text-anchor="middle" fill="white" font-size="17" font-weight="bold" letter-spacing="0.4">DI-PASSIONATE FreeCAD — Chip-Packaging Workflow</text>

  <!-- ══════════════════════════════════════════════
       PHASE 1 — INPUT FILES
  ══════════════════════════════════════════════ -->
  <text x="30" y="76" fill="#2980b9" font-size="10.5" font-weight="bold" letter-spacing="1">① INPUT FILES</text>

  <!-- .gds box -->
  <rect x="30" y="82" width="255" height="58" rx="6" fill="#d6eaf8" stroke="#3498db" stroke-width="2"/>
  <text x="157" y="106" text-anchor="middle" fill="#1a5276" font-size="13" font-weight="bold">.gds / .GDS</text>
  <text x="157" y="124" text-anchor="middle" fill="#2980b9" font-size="11">GDSII chip layout</text>

  <!-- .lyp box -->
  <rect x="323" y="82" width="254" height="58" rx="6" fill="#d6eaf8" stroke="#3498db" stroke-width="2"/>
  <text x="450" y="106" text-anchor="middle" fill="#1a5276" font-size="13" font-weight="bold">.lyp</text>
  <text x="450" y="124" text-anchor="middle" fill="#2980b9" font-size="11">KLayout layer colours</text>

  <!-- .map box (optional / dashed) -->
  <rect x="615" y="82" width="255" height="58" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="742" y="104" text-anchor="middle" fill="#1e8449" font-size="12" font-weight="bold">.map</text>
  <text x="742" y="120" text-anchor="middle" fill="#1e8449" font-size="10.5" font-style="italic">(optional)</text>
  <text x="742" y="134" text-anchor="middle" fill="#1e8449" font-size="10.5">IHP tech / Z-stack heights</text>

  <!-- Convergence lines → single downward arrow -->
  <line x1="157" y1="140" x2="157" y2="158" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="140" x2="450" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="742" y1="140" x2="742" y2="158" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="157" y1="158" x2="742" y2="158" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="158" x2="450" y2="171" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 2 — LOAD GDSII
  ══════════════════════════════════════════════ -->
  <rect x="15" y="174" width="870" height="141" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <!-- header: top-rounded-only path -->
  <path d="M 23,174 L 877,174 Q 885,174 885,182 L 885,208 L 15,208 L 15,182 Q 15,174 23,174 Z" fill="#27ae60"/>
  <text x="450" y="197" text-anchor="middle" fill="white" font-size="14" font-weight="bold">② LOAD GDSII</text>

  <!-- options list -->
  <text x="36" y="226" fill="#1e8449" font-size="11" font-weight="bold">Layer Selector dialog options:</text>
  <text x="44" y="244" fill="#1d6a3e" font-size="11">◆  Match KLayout colours</text>
  <text x="44" y="260" fill="#1d6a3e" font-size="11">◆  Highlight bondable pads (rendered in gold)</text>
  <text x="44" y="276" fill="#1d6a3e" font-size="11">◆  3D layer extrusion  (uses .map Z-heights)</text>
  <text x="44" y="292" fill="#1d6a3e" font-size="11">◆  Auto PIN contact detection</text>

  <!-- Auto-PIN callout -->
  <rect x="476" y="215" width="394" height="92" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="673" y="234" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold">⚡ Auto PIN Detection = ON</text>
  <text x="673" y="252" text-anchor="middle" fill="#7d6608" font-size="10.5">ContactPoint markers are placed</text>
  <text x="673" y="267" text-anchor="middle" fill="#7d6608" font-size="10.5">automatically on top-metal PIN layers</text>
  <text x="673" y="282" text-anchor="middle" fill="#7d6608" font-size="10.5">→ Step ⑥ manual definition can be skipped</text>
  <text x="673" y="297" text-anchor="middle" fill="#7d6608" font-size="10.5">Best results with an IHP .map file</text>
  <!-- dashed arrow from option 4 to callout -->
  <line x1="308" y1="289" x2="474" y2="268" stroke="#f39c12" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-o)"/>

  <!-- arrow down -->
  <line x1="450" y1="315" x2="450" y2="329" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 3 — LEADFRAME DESIGN
  ══════════════════════════════════════════════ -->
  <rect x="15" y="332" width="870" height="158" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <path d="M 23,332 L 877,332 Q 885,332 885,340 L 885,366 L 15,366 L 15,340 Q 15,332 23,332 Z" fill="#f39c12"/>
  <text x="450" y="355" text-anchor="middle" fill="white" font-size="14" font-weight="bold">③ LEADFRAME DESIGN</text>

  <!-- Leadframe Configurator sub-box -->
  <rect x="30" y="374" width="376" height="78" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="218" y="394" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">Leadframe Configurator</text>
  <text x="218" y="411" text-anchor="middle" fill="#7d6608" font-size="10.5">Package type: QFN / QFP / BGA</text>
  <text x="218" y="426" text-anchor="middle" fill="#7d6608" font-size="10.5">Body size (L × W × thickness)</text>
  <text x="218" y="441" text-anchor="middle" fill="#7d6608" font-size="10.5">Lead count per side · Material</text>

  <text x="424" y="418" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">OR</text>

  <!-- Online Library sub-box -->
  <rect x="454" y="374" width="416" height="78" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="662" y="394" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">Leadframe Online Library</text>
  <text x="662" y="411" text-anchor="middle" fill="#7d6608" font-size="10.5">Browse MirrorSemi CAD catalogue</text>
  <text x="662" y="426" text-anchor="middle" fill="#7d6608" font-size="10.5">Preview images · Download STEP/IGES/DXF</text>
  <text x="662" y="441" text-anchor="middle" fill="#7d6608" font-size="10.5">Auto-insert into active document</text>

  <!-- Center Leadframe button (inside phase 3 box) -->
  <rect x="293" y="461" width="314" height="24" rx="5" fill="#e6940a"/>
  <text x="450" y="478" text-anchor="middle" fill="white" font-size="11" font-weight="bold">⊕  Center Leadframe on GDS</text>

  <!-- arrow down -->
  <line x1="450" y1="490" x2="450" y2="503" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 4 — CHIP PLACEMENT
  ══════════════════════════════════════════════ -->
  <rect x="15" y="506" width="870" height="84" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <path d="M 23,506 L 877,506 Q 885,506 885,514 L 885,540 L 15,540 L 15,514 Q 15,506 23,506 Z" fill="#8e44ad"/>
  <text x="450" y="529" text-anchor="middle" fill="white" font-size="14" font-weight="bold">④ CHIP PLACEMENT — Layer on Leadframe</text>
  <text x="450" y="556" text-anchor="middle" fill="#6c3483" font-size="11">Scale GDS layers to fit the die paddle</text>
  <text x="450" y="573" text-anchor="middle" fill="#6c3483" font-size="11">Apply rotation · Mirror · Z-offset · Auto-fit to leadframe dimensions</text>

  <!-- arrow down -->
  <line x1="450" y1="590" x2="450" y2="604" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 5 — HOUSING
  ══════════════════════════════════════════════ -->
  <rect x="15" y="607" width="870" height="84" rx="8" fill="#e8f8f5" stroke="#16a085" stroke-width="2"/>
  <path d="M 23,607 L 877,607 Q 885,607 885,615 L 885,641 L 15,641 L 15,615 Q 15,607 23,607 Z" fill="#16a085"/>
  <text x="450" y="630" text-anchor="middle" fill="white" font-size="14" font-weight="bold">⑤ HOUSING — Housing Configurator</text>
  <text x="450" y="657" text-anchor="middle" fill="#0e6655" font-size="11">Generate transparent mold compound body</text>
  <text x="450" y="674" text-anchor="middle" fill="#0e6655" font-size="11">Parametric dimensions · Surrounds leadframe and chip assembly</text>

  <!-- arrow down -->
  <line x1="450" y1="691" x2="450" y2="704" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 6 — CONTACT POINTS
  ══════════════════════════════════════════════ -->
  <rect x="15" y="707" width="870" height="100" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <path d="M 23,707 L 877,707 Q 885,707 885,715 L 885,741 L 15,741 L 15,715 Q 15,707 23,707 Z" fill="#e74c3c"/>
  <text x="450" y="727" text-anchor="middle" fill="white" font-size="13" font-weight="bold">⑥ CONTACT POINTS</text>
  <text x="450" y="739" text-anchor="middle" fill="#fdc8c4" font-size="10">(skip this step if Auto PIN detection was enabled in Step ②)</text>

  <!-- Define Contact Points sub-box -->
  <rect x="30" y="749" width="393" height="46" rx="5" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="227" y="769" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">Define Contact Points (manual)</text>
  <text x="227" y="785" text-anchor="middle" fill="#922b21" font-size="10.5">Select GDS object → marker at top-face centre</text>

  <!-- Contact Point Browser sub-box -->
  <rect x="447" y="749" width="423" height="46" rx="5" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="659" y="769" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">Contact Point Browser</text>
  <text x="659" y="785" text-anchor="middle" fill="#922b21" font-size="10.5">Dock panel · list &amp; hover-highlight markers in 3D</text>

  <!-- arrow down -->
  <line x1="450" y1="807" x2="450" y2="821" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 7 — WIRE BONDING
  ══════════════════════════════════════════════ -->
  <rect x="15" y="824" width="870" height="130" rx="8" fill="#eaecee" stroke="#2c3e50" stroke-width="2"/>
  <path d="M 23,824 L 877,824 Q 885,824 885,832 L 885,858 L 15,858 L 15,832 Q 15,824 23,824 Z" fill="#2c3e50"/>
  <text x="450" y="846" text-anchor="middle" fill="white" font-size="14" font-weight="bold">⑦ WIRE BONDING — Manual 2D Wire Bonding</text>

  <text x="450" y="874" text-anchor="middle" fill="#2c3e50" font-size="11">1. Click a ContactPoint on the die pad  (shown in orange)</text>
  <text x="450" y="890" text-anchor="middle" fill="#2c3e50" font-size="11">2. Click a ContactPoint on the leadframe lead  (shown in blue)</text>
  <text x="450" y="906" text-anchor="middle" fill="#2c3e50" font-size="11">→ 3D bond wire geometry is created · Repeat for each bond</text>

  <!-- Finish / Cancel -->
  <rect x="30" y="916" width="375" height="30" rx="5" fill="#27ae60"/>
  <text x="218" y="936" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✔  Finish Wire Bonding</text>
  <rect x="450" y="916" width="420" height="30" rx="5" fill="#c0392b"/>
  <text x="660" y="936" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✘  Cancel Wire Bonding</text>

  <!-- dashed arrow down (planned step) -->
  <line x1="450" y1="954" x2="450" y2="968" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>

  <!-- ══════════════════════════════════════════════
       PHASE 8 — EXPORT (PLANNED)
  ══════════════════════════════════════════════ -->
  <rect x="15" y="971" width="870" height="62" rx="8" fill="#f8f9fa" stroke="#95a5a6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="999" text-anchor="middle" fill="#7f8c8d" font-size="14" font-weight="bold">⑧ EXPORT</text>
  <text x="450" y="1014" text-anchor="middle" fill="#95a5a6" font-size="10.5" font-style="italic">(planned)</text>
  <text x="450" y="1025" text-anchor="middle" fill="#aaa" font-size="10.5">Assembly export for thermal simulation · Comprehensive material assignment</text>

  <!-- ══════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════ -->
  <rect x="15" y="1046" width="870" height="24" rx="6" fill="#e2e8ef"/>
  <text x="28" y="1063" fill="#7f8c8d" font-size="10" font-weight="bold">Legend:</text>

  <rect x="84" y="1051" width="10" height="10" rx="2" fill="#27ae60"/>
  <text x="100" y="1062" fill="#555" font-size="10">Implemented tool</text>

  <rect x="210" y="1051" width="10" height="10" rx="2" fill="#f8f9fa" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="226" y="1062" fill="#555" font-size="10">Planned feature</text>

  <rect x="318" y="1051" width="10" height="10" rx="2" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="334" y="1062" fill="#555" font-size="10">Optional / conditional step</text>

  <line x1="502" y1="1050" x2="502" y2="1060" stroke="#ccc" stroke-width="1"/>
  <text x="514" y="1062" fill="#aaa" font-size="10">DI-PASSIONATE FreeCAD Workbench · BMBF Project</text>

</svg>
